name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: Type check, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholder values — CI only checks that the app compiles correctly.
          # Real values live in Vercel. NEXT_PUBLIC_* vars are baked in at build
          # time so something must be present, but the actual value doesn't matter here.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: placeholder-maps-key
          NEXT_PUBLIC_SENTRY_DSN: https://placeholder@placeholder.ingest.sentry.io/0
          # Disables source map upload during CI build (no real token needed)
          SENTRY_AUTH_TOKEN: placeholder
          SENTRY_ORG: vanguardt
          SENTRY_PROJECT: javascript-nextjs
