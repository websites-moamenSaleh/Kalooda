name: Dependency Audit

on:
  schedule:
    # Every Monday at 09:00 Israel time (UTC+3 summer / UTC+2 winter)
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit
        id: audit
        run: |
          set +e
          npm audit --audit-level=high --json > audit_result.json 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          set -e

      - name: Post to Slack
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXIT_CODE: ${{ steps.audit.outputs.exit_code }}
        run: |
          if [ "$EXIT_CODE" = "0" ]; then
            TEXT=":white_check_mark: *Weekly dependency audit passed* — no high or critical vulnerabilities found."
          else
            TEXT=":warning: *Weekly dependency audit found vulnerabilities* — see $RUN_URL"
          fi
          PAYLOAD=$(jq -n --arg channel "C0ASJHCE9AR" --arg text "$TEXT" \
            '{"channel": $channel, "text": $text}')
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
